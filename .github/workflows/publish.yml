name: Publish to public repo

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Push to public repo
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          git clone https://x-access-token:${{ secrets.PUBLISH_TOKEN }}@github.com/partyfix/partyfix-data-public.git /tmp/public-repo
          
          cp festivals.json /tmp/public-repo/festivals.json
          cp -r images/. /tmp/public-repo/images/
          
          cd /tmp/public-repo
          git add .
          git diff --staged --quiet || git commit -m "Update from private repo"
          git push
